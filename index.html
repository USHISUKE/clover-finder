<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f5c2f" />
  <title>四つ葉ファインダー</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">CAMERA HELPER</p>
        <h1>四つ葉ファインダー</h1>
      </div>
      <div id="appState" class="state-chip" aria-live="polite">待機中</div>
    </header>

    <section class="finder" aria-label="カメラ画面">
      <div id="stage" class="stage">
        <video id="video" playsinline muted></video>
        <canvas id="overlay"></canvas>
        <div id="emptyState" class="empty-state">
          <strong>カメラを開始</strong>
          <span>クローバーに近づけて、赤い丸の場所を確認してください。</span>
        </div>
      </div>

      <canvas id="work" class="hidden"></canvas>

      <div class="primary-controls" aria-label="操作ボタン">
        <button id="startBtn" class="btn btn-primary" type="button">
          <span class="btn-main">カメラ開始</span>
          <span class="btn-sub">探しはじめる</span>
        </button>
        <button id="stopBtn" class="btn btn-secondary" type="button" disabled>
          <span class="btn-main">停止</span>
          <span class="btn-sub">カメラを止める</span>
        </button>
      </div>
    </section>

    <section class="settings-card" aria-label="検出設定">
      <div class="setting-block">
        <div class="setting-title">検出の厳しさ</div>
        <div class="segmented" role="radiogroup" aria-label="検出の厳しさ">
          <button class="seg-btn" type="button" data-setting="strictness" data-value="loose">ゆるめ</button>
          <button class="seg-btn is-active" type="button" data-setting="strictness" data-value="normal">標準</button>
          <button class="seg-btn" type="button" data-setting="strictness" data-value="strict">厳しめ</button>
        </div>
      </div>

      <div class="setting-block">
        <div class="setting-title">探す葉サイズ</div>
        <div class="segmented" role="radiogroup" aria-label="探す葉サイズ">
          <button class="seg-btn" type="button" data-setting="size" data-value="small">小さめ</button>
          <button class="seg-btn is-active" type="button" data-setting="size" data-value="normal">標準</button>
          <button class="seg-btn" type="button" data-setting="size" data-value="large">大きめ</button>
        </div>
      </div>
    </section>

    <section class="guide-card">
      <details>
        <summary>使い方とコツ</summary>
        <ul>
          <li>明るい場所で、影が少ない角度から映します。</li>
          <li>クローバーの葉が画面内で小さすぎると候補が出にくくなります。</li>
          <li>赤い丸は「発見確定」ではなく「目視確認する候補」です。</li>
          <li>候補が多すぎる場合は「厳しめ」、出ない場合は「ゆるめ」を選びます。</li>
        </ul>
      </details>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
